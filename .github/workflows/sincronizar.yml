name: Sincronizar Bascula Wyze

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wyze-sdk garminconnect garth certifi

      - name: Run Script
        env:
          # Aquí conectamos la "caja fuerte" de GitHub con el script de Python
          WYZE_EMAIL: ${{ secrets.WYZE_EMAIL }}
          WYZE_PASSWORD: ${{ secrets.WYZE_PASSWORD }}
          WYZE_KEY_ID: ${{ secrets.WYZE_KEY_ID }}
          WYZE_API_KEY: ${{ secrets.WYZE_API_KEY }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          # 1. Activamos los certificados de seguridad
          export SSL_CERT_FILE=$(python -m certifi)
          export REQUESTS_CA_BUNDLE=$(python -m certifi)
          
          # 2. Corremos el script
          python scale.py
