name: Sincronizar Bascula Wyze

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wyze-sdk garminconnect garth certifi

      - name: Run Script
        env:
          WYZE_EMAIL: ${{ secrets.WYZE_EMAIL }}
          # ... rest of your secrets ...
        run: |
          # Configuramos la variable de entorno para todo el proceso
          export SSL_CERT_FILE=$(python -m certifi)
          export REQUESTS_CA_BUNDLE=$(python -m certifi)
          python scale.py
