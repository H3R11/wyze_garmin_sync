name: Generate Garmin Tokens
on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install python-garminconnect
        run: pip install garminconnect

      - name: Generate tokens
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python -c "
          import garminconnect, os, json
          api = garminconnect.Garmin(os.environ['GARMIN_EMAIL'], os.environ['GARMIN_PASSWORD'])
          api.login()
          tokens = api.garth.client.dumps()
          print('--- COPIA ESTO COMO SECRET GARMIN_TOKENS ---')
          print(tokens)
          print('--- FIN ---')
          "
